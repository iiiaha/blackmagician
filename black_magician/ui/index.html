<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Black Magician - Debug</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; height: 100vh; font-family: monospace; font-size: 12px; background: #111; color: #0f0; padding: 10px; overflow-y: auto; }
  .section { margin: 10px 0; padding: 8px; border: 1px solid #333; }
  .section h3 { color: #ff0; margin-bottom: 5px; }
  .ok { color: #0f0; }
  .fail { color: #f00; }
  .warn { color: #ff0; }
  button { margin: 4px; padding: 4px 12px; cursor: pointer; }
  iframe { border: 1px solid #555; background: #fff; }
</style>
</head>
<body>

<h2>Black Magician - Connection Debug</h2>
<div id="log"></div>

<div class="section">
  <h3>Test 1: Fetch (cors)</h3>
  <div id="test1">running...</div>
</div>

<div class="section">
  <h3>Test 2: Fetch (no-cors)</h3>
  <div id="test2">running...</div>
</div>

<div class="section">
  <h3>Test 3: Response Headers</h3>
  <div id="test3">running...</div>
</div>

<div class="section">
  <h3>Test 4: XHR</h3>
  <div id="test4">running...</div>
</div>

<div class="section">
  <h3>Test 5: iframe (200x100)</h3>
  <div id="test5">creating...</div>
  <iframe id="test-iframe" width="400" height="100" src="about:blank"></iframe>
</div>

<div class="section">
  <h3>Manual Tests</h3>
  <button onclick="trySetUrl()">Try set_url via sketchup</button>
  <button onclick="tryWindowOpen()">Try window.open</button>
  <button onclick="tryLocationHref()">Try location.href</button>
  <button onclick="trySrcdoc()">Try srcdoc iframe</button>
  <div id="manual"></div>
</div>

<script>
var URL = 'https://blackmagician.pages.dev';

function $(id) { return document.getElementById(id); }
function log(id, msg, cls) {
  $(id).innerHTML += '<div class="' + (cls||'') + '">' + msg + '</div>';
}

// Test 1: fetch cors
fetch(URL, { mode: 'cors', credentials: 'omit' })
  .then(function(r) {
    log('test1', 'Status: ' + r.status + ', Type: ' + r.type, 'ok');
    log('test1', 'Content-Type: ' + r.headers.get('content-type'));
    log('test1', 'X-Frame-Options: ' + r.headers.get('x-frame-options'));
    log('test1', 'CSP: ' + r.headers.get('content-security-policy'));
    return r.text();
  })
  .then(function(body) {
    log('test1', 'Body length: ' + body.length + ' chars');
    log('test1', 'Contains &lt;div id="root"&gt;: ' + (body.indexOf('id="root"') > -1), body.indexOf('id="root"') > -1 ? 'ok' : 'fail');
    log('test1', 'First 200 chars: ' + body.substring(0, 200).replace(/</g, '&lt;'));
  })
  .catch(function(e) { log('test1', 'FAILED: ' + e.message, 'fail'); });

// Test 2: fetch no-cors
fetch(URL, { mode: 'no-cors' })
  .then(function(r) {
    log('test2', 'Status: ' + r.status + ', Type: ' + r.type, r.type === 'opaque' ? 'warn' : 'ok');
  })
  .catch(function(e) { log('test2', 'FAILED: ' + e.message, 'fail'); });

// Test 3: Headers via HEAD
fetch(URL, { method: 'HEAD', mode: 'cors' })
  .then(function(r) {
    var headers = [];
    r.headers.forEach(function(v, k) { headers.push(k + ': ' + v); });
    log('test3', headers.join('<br>'), 'ok');
  })
  .catch(function(e) { log('test3', 'FAILED: ' + e.message, 'fail'); });

// Test 4: XHR
var xhr = new XMLHttpRequest();
xhr.open('GET', URL, true);
xhr.onload = function() {
  log('test4', 'Status: ' + xhr.status, 'ok');
  log('test4', 'Response length: ' + xhr.responseText.length);
  log('test4', 'X-Frame-Options header: ' + xhr.getResponseHeader('X-Frame-Options'));
};
xhr.onerror = function() { log('test4', 'XHR ERROR', 'fail'); };
xhr.send();

// Test 5: iframe
setTimeout(function() {
  var iframe = $('test-iframe');
  iframe.onload = function() { log('test5', 'onload fired', 'ok'); };
  iframe.onerror = function() { log('test5', 'onerror fired', 'fail'); };
  iframe.src = URL;
  log('test5', 'src set to ' + URL);

  setTimeout(function() {
    try {
      log('test5', 'contentWindow: ' + (iframe.contentWindow ? 'exists' : 'null'));
      log('test5', 'contentDocument accessible: ' + (iframe.contentDocument ? 'yes' : 'no'));
    } catch(e) {
      log('test5', 'Cross-origin blocked (expected): ' + e.message, 'warn');
    }
  }, 5000);
}, 500);

// Manual tests
function tryWindowOpen() {
  log('manual', 'Opening window...', 'warn');
  window.open(URL, '_blank');
}
function tryLocationHref() {
  log('manual', 'Redirecting...', 'warn');
  location.href = URL;
}
function trySrcdoc() {
  log('manual', 'Fetching HTML for srcdoc...', 'warn');
  fetch(URL).then(function(r) { return r.text(); }).then(function(html) {
    var iframe = $('test-iframe');
    iframe.srcdoc = html;
    log('manual', 'srcdoc set (' + html.length + ' chars)', 'ok');
  }).catch(function(e) { log('manual', 'srcdoc FAILED: ' + e.message, 'fail'); });
}
function trySetUrl() {
  if (typeof sketchup !== 'undefined') {
    log('manual', 'Calling sketchup callback not available for set_url', 'warn');
  } else {
    log('manual', 'sketchup object not found', 'fail');
  }
}
</script>
</body>
</html>
