<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PBR Map Generator Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
  h1 { font-size: 16px; margin-bottom: 16px; }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .controls label { font-size: 11px; color: #999; }
  .controls input[type=range] { width: 120px; }
  .controls span { font-size: 10px; color: #666; min-width: 30px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .grid > div { text-align: center; }
  .grid canvas { width: 100%; border: 1px solid #333; border-radius: 4px; }
  .grid p { font-size: 10px; color: #999; margin-top: 4px; }
  input[type=file] { font-size: 11px; }
  button { background: #333; border: 1px solid #555; color: #eee; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; }
  button:hover { background: #444; }
</style>
</head>
<body>
  <h1>PBR Map Generator Test</h1>

  <div class="controls">
    <input type="file" id="fileInput" accept="image/*">
    <label>Normal Strength</label>
    <input type="range" id="normalStrength" min="0.5" max="5" step="0.1" value="2">
    <span id="normalVal">2.0</span>

    <label>Roughness Base</label>
    <input type="range" id="roughnessBase" min="0" max="1" step="0.05" value="0.5">
    <span id="roughVal">0.50</span>

    <label>AO Strength</label>
    <input type="range" id="aoStrength" min="0" max="2" step="0.1" value="1">
    <span id="aoVal">1.0</span>

    <button id="downloadAll">Download All</button>
  </div>

  <div class="grid">
    <div><canvas id="albedo"></canvas><p>Albedo (Original)</p></div>
    <div><canvas id="normal"></canvas><p>Normal Map</p></div>
    <div><canvas id="roughness"></canvas><p>Roughness Map</p></div>
    <div><canvas id="ao"></canvas><p>Ambient Occlusion</p></div>
  </div>

  <script>
    const albedoCanvas = document.getElementById('albedo')
    const normalCanvas = document.getElementById('normal')
    const roughCanvas = document.getElementById('roughness')
    const aoCanvas = document.getElementById('ao')

    const normalStrength = document.getElementById('normalStrength')
    const roughnessBase = document.getElementById('roughnessBase')
    const aoStrengthEl = document.getElementById('aoStrength')

    let sourceImg = null

    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0]
      if (!file) return
      const img = new Image()
      img.onload = () => { sourceImg = img; generate() }
      img.src = URL.createObjectURL(file)
    })

    normalStrength.addEventListener('input', () => { document.getElementById('normalVal').textContent = Number(normalStrength.value).toFixed(1); if (sourceImg) generate() })
    roughnessBase.addEventListener('input', () => { document.getElementById('roughVal').textContent = Number(roughnessBase.value).toFixed(2); if (sourceImg) generate() })
    aoStrengthEl.addEventListener('input', () => { document.getElementById('aoVal').textContent = Number(aoStrengthEl.value).toFixed(1); if (sourceImg) generate() })

    function generate() {
      const w = sourceImg.width, h = sourceImg.height

      // Draw albedo
      albedoCanvas.width = w; albedoCanvas.height = h
      const actx = albedoCanvas.getContext('2d')
      actx.drawImage(sourceImg, 0, 0)

      // Get pixel data
      const srcData = actx.getImageData(0, 0, w, h)
      const src = srcData.data

      // Grayscale (luminance)
      const gray = new Float32Array(w * h)
      for (let i = 0; i < w * h; i++) {
        const r = src[i * 4], g = src[i * 4 + 1], b = src[i * 4 + 2]
        gray[i] = (0.299 * r + 0.587 * g + 0.114 * b) / 255
      }

      generateNormal(w, h, gray)
      generateRoughness(w, h, gray)
      generateAO(w, h, gray)
    }

    function generateNormal(w, h, gray) {
      normalCanvas.width = w; normalCanvas.height = h
      const ctx = normalCanvas.getContext('2d')
      const out = ctx.createImageData(w, h)
      const d = out.data
      const strength = Number(normalStrength.value)

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const idx = y * w + x

          // Sobel
          const tl = gray[((y - 1 + h) % h) * w + ((x - 1 + w) % w)]
          const t  = gray[((y - 1 + h) % h) * w + x]
          const tr = gray[((y - 1 + h) % h) * w + ((x + 1) % w)]
          const l  = gray[y * w + ((x - 1 + w) % w)]
          const r  = gray[y * w + ((x + 1) % w)]
          const bl = gray[((y + 1) % h) * w + ((x - 1 + w) % w)]
          const b  = gray[((y + 1) % h) * w + x]
          const br = gray[((y + 1) % h) * w + ((x + 1) % w)]

          const dX = (tr + 2 * r + br) - (tl + 2 * l + bl)
          const dY = (bl + 2 * b + br) - (tl + 2 * t + tr)

          const nx = -dX * strength
          const ny = -dY * strength
          const nz = 1.0
          const len = Math.sqrt(nx * nx + ny * ny + nz * nz)

          const pi = idx * 4
          d[pi]     = Math.round((nx / len * 0.5 + 0.5) * 255)
          d[pi + 1] = Math.round((ny / len * 0.5 + 0.5) * 255)
          d[pi + 2] = Math.round((nz / len * 0.5 + 0.5) * 255)
          d[pi + 3] = 255
        }
      }
      ctx.putImageData(out, 0, 0)
    }

    function generateRoughness(w, h, gray) {
      roughCanvas.width = w; roughCanvas.height = h
      const ctx = roughCanvas.getContext('2d')
      const out = ctx.createImageData(w, h)
      const d = out.data
      const base = Number(roughnessBase.value)

      for (let i = 0; i < w * h; i++) {
        // Mix base roughness with inverted luminance
        const lum = gray[i]
        const rough = base + (1 - lum) * (1 - base) * 0.5
        const v = Math.round(Math.min(1, Math.max(0, rough)) * 255)
        const pi = i * 4
        d[pi] = v; d[pi + 1] = v; d[pi + 2] = v; d[pi + 3] = 255
      }
      ctx.putImageData(out, 0, 0)
    }

    function generateAO(w, h, gray) {
      aoCanvas.width = w; aoCanvas.height = h
      const ctx = aoCanvas.getContext('2d')
      const out = ctx.createImageData(w, h)
      const d = out.data
      const strength = Number(aoStrengthEl.value)
      const radius = Math.max(2, Math.round(Math.min(w, h) * 0.01))

      // Box blur for AO
      const blurred = new Float32Array(w * h)
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          let sum = 0, count = 0
          for (let dy = -radius; dy <= radius; dy++) {
            for (let dx = -radius; dx <= radius; dx++) {
              const sy = Math.min(h - 1, Math.max(0, y + dy))
              const sx = Math.min(w - 1, Math.max(0, x + dx))
              sum += gray[sy * w + sx]
              count++
            }
          }
          blurred[y * w + x] = sum / count
        }
      }

      for (let i = 0; i < w * h; i++) {
        const ao = 1.0 - (1.0 - blurred[i]) * strength
        const v = Math.round(Math.min(1, Math.max(0, ao)) * 255)
        const pi = i * 4
        d[pi] = v; d[pi + 1] = v; d[pi + 2] = v; d[pi + 3] = 255
      }
      ctx.putImageData(out, 0, 0)
    }

    document.getElementById('downloadAll').addEventListener('click', () => {
      if (!sourceImg) return
      ;['albedo', 'normal', 'roughness', 'ao'].forEach(name => {
        const canvas = document.getElementById(name)
        const a = document.createElement('a')
        a.download = name + '.png'
        a.href = canvas.toDataURL('image/png')
        a.click()
      })
    })
  </script>
</body>
</html>
